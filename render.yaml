databases:
  - name: atlas-database
    plan: free

services:
  - type: web
    name: atlas-api
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm --filter @atlas/api prisma:generate && pnpm build
    startCommand: pnpm --filter @atlas/api start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://atlas-web.onrender.com
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: UPLOADTHING_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: atlas-web
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm --filter @atlas/api prisma:generate && pnpm build
    startCommand: pnpm --filter @atlas/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://atlas-api.onrender.com
