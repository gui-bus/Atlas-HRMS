services:
  # 1. Banco de Dados PostgreSQL (Render Managed)
  - type: db
    name: atlas-database
    plan: free
    ipAllowList: [] # Permite conexões apenas de dentro da rede do Render (seguro)

  # 2. Servidor Backend (NestJS API)
  - type: web
    name: atlas-api
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm --filter @atlas/api prisma:generate && pnpm build
    startCommand: pnpm --filter @atlas/api start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Gera um secret seguro aleatório automaticamente
      - key: FRONTEND_URL
        fromService:
          type: web
          name: atlas-web
          property: url
      # Essas variáveis dependem de serviços externos (UploadThing e Resend)
      # Devem ser preenchidas manualmente no painel do Render se você desejar testar upload/emails em produção
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # 3. Frontend (Next.js Web App)
  - type: web
    name: atlas-web
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm --filter @atlas/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: atlas-api
          property: url
